name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/dadapunk/scraper-service

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull new image
        run: podman pull ghcr.io/dadapunk/scraper-service:latest

      - name: Restart service
        run: systemctl restart scraper-service
